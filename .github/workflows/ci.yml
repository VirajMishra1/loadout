name: CI

on:
  push:
    branches: [main, develop, "dev/**"]
  pull_request:
  workflow_dispatch:

# One current run per ref is enough; cancel stale work before it consumes paid minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Fast verification (Ubuntu, Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: node scripts/check-catalog-attribution.mjs
      - run: node scripts/check-discovery-artifacts.mjs
      - run: npm test -- --run
      # The shipped CLI is the product gate: isolated profile, real state, no network.
      - run: npm run test:e2e:cli
      - run: npm run test:package
      - run: npm run test:performance

  dashboard-e2e:
    name: Optional dashboard browser diagnostics
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium-headless-shell
      - run: npm run test:e2e:dashboard

  cross-platform:
    name: Native install (Node ${{ matrix.node }}, ${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run test:e2e:cli
      - run: npm run test:package
