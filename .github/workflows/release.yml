name: Publish npm release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish with npm provenance
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use an npm CLI with trusted-publishing support
        run: npm install --global npm@11.5.1
      - run: npm --version
      - run: npm ci
      - run: npm run verify
      - name: Verify tag matches package version
        shell: bash
        run: |
          test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
      - run: npm publish --access public --provenance
        env:
          # Needed only for the first publication before npm trusted publishing
          # can be attached. OIDC is preferred and wins once configured.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
